name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ["8", "11", "17", "21"]
        distribution: ["temurin"]
        include:
          # 测试 Java 11 也用 Oracle 发行版（对应 Travis 的 oraclejdk11）
          - java-version: "11"
            distribution: "oracle-graal"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ matrix.java-version }} (${{ matrix.distribution }})
        uses: actions/setup-java@v4
        with:
          distribution: '${{ matrix.distribution }}'
          java-version: '${{ matrix.java-version }}'
          cache: gradle

      - name: Make hosts file entry
        run: |
          sudo echo "127.0.0.1 mocobuild" | sudo tee -a /etc/hosts

      - name: Run checks
        run: ./gradlew check -i

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-java-${{ matrix.java-version }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
